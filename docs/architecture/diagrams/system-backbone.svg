<svg viewBox="0 0 940 560" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="b2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="940" height="560" fill="#ffffff"/>

  <!-- Clients -->
  <rect x="250" y="24" width="200" height="52" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="350" y="47" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">Web App</text>
  <text x="350" y="64" text-anchor="middle" font-size="10" fill="#6d28d9">React 18 + Vite (TypeScript)</text>

  <rect x="490" y="24" width="200" height="52" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="590" y="47" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">Mobile App</text>
  <text x="590" y="64" text-anchor="middle" font-size="10" fill="#6d28d9">React Native / Expo</text>

  <!-- Gateway -->
  <rect x="150" y="112" width="640" height="58" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.4"/>
  <text x="470" y="136" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1e3a8a">API Gateway — Spring Cloud Gateway (:8080)</text>
  <text x="470" y="155" text-anchor="middle" font-size="10.5" fill="#1d4ed8">path routing · JWT auth · Redis rate limiting · per-route circuit breakers</text>

  <!-- Platform infra (right) -->
  <rect x="808" y="106" width="122" height="30" rx="6" fill="#e2e8f0" stroke="#475569"/>
  <text x="869" y="125" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1e293b">Config Server</text>
  <rect x="808" y="146" width="122" height="30" rx="6" fill="#e2e8f0" stroke="#475569"/>
  <text x="869" y="165" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1e293b">Spring Boot Admin</text>

  <!-- clients -> gateway -->
  <line x1="350" y1="76" x2="350" y2="111" stroke="#475569" stroke-width="1.5" marker-end="url(#b)"/>
  <line x1="590" y1="76" x2="590" y2="111" stroke="#475569" stroke-width="1.5" marker-end="url(#b)"/>

  <!-- gateway -> services -->
  <line x1="470" y1="170" x2="470" y2="204" stroke="#475569" stroke-width="1.8" marker-end="url(#b)"/>
  <text x="485" y="192" font-size="10" fill="#475569">routes /api/**</text>

  <!-- Business services group -->
  <rect x="150" y="206" width="640" height="96" rx="10" fill="#ffffff" stroke="#0ea5e9" stroke-width="1.4"/>
  <text x="470" y="230" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f172a">Business microservices — Spring Boot</text>
  <text x="470" y="250" text-anchor="middle" font-size="10.5" fill="#475569">each owns one business capability and its own PostgreSQL database (database-per-service)</text>
  <text x="470" y="272" text-anchor="middle" font-size="10.5" fill="#475569">stateless behind the gateway · communicate via REST (Feign) and Kafka events</text>
  <text x="470" y="291" text-anchor="middle" font-size="10" font-style="italic" fill="#0284c7">see the per-platform service maps for the actual services and ports</text>

  <!-- services <-> kafka -->
  <line x1="470" y1="302" x2="470" y2="336" stroke="#b45309" stroke-width="1.8" marker-start="url(#b2)" marker-end="url(#b2)"/>
  <text x="485" y="324" font-size="10" fill="#b45309">publish / consume events</text>

  <!-- Kafka -->
  <rect x="150" y="338" width="640" height="46" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="470" y="357" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">Apache Kafka — event bus</text>
  <text x="470" y="374" text-anchor="middle" font-size="10" fill="#9a3412">asynchronous domain events decouple order · payment · inventory · fulfilment · notifications</text>

  <!-- Data + external -->
  <rect x="150" y="418" width="250" height="64" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="275" y="443" text-anchor="middle" font-size="12.5" font-weight="700" fill="#14532d">PostgreSQL</text>
  <text x="275" y="461" text-anchor="middle" font-size="10" fill="#166534">one database per service</text>

  <rect x="416" y="418" width="180" height="64" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="506" y="443" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7f1d1d">Redis</text>
  <text x="506" y="461" text-anchor="middle" font-size="10" fill="#991b1b">catalog cache · gateway rate-limit</text>

  <rect x="612" y="418" width="178" height="64" rx="8" fill="#f1f5f9" stroke="#64748b"/>
  <text x="701" y="443" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">External providers</text>
  <text x="701" y="461" text-anchor="middle" font-size="10" fill="#475569">Razorpay · Email/SMS · Maps</text>

  <!-- links from services to data -->
  <line x1="300" y1="384" x2="285" y2="417" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#b)"/>
  <line x1="470" y1="384" x2="500" y2="417" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#b)"/>
  <line x1="640" y1="384" x2="695" y2="417" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#b)"/>

  <text x="150" y="512" font-size="10" fill="#94a3b8">Containerised with Docker and deployed to cloud infrastructure. Both platforms share this same backbone.</text>
</svg>
