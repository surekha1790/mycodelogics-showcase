<svg viewBox="0 0 1120 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
  </defs>

  <!-- ===== Clients ===== -->
  <g>
    <rect x="170" y="24" width="220" height="56" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="280" y="49" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">Customer UI</text>
    <text x="280" y="67" text-anchor="middle" font-size="11" fill="#6d28d9">React 18 + Vite</text>

    <rect x="450" y="24" width="220" height="56" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="560" y="49" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">Admin UI</text>
    <text x="560" y="67" text-anchor="middle" font-size="11" fill="#6d28d9">React 18 + Vite</text>

    <rect x="730" y="24" width="220" height="56" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="840" y="49" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">Mobile App</text>
    <text x="840" y="67" text-anchor="middle" font-size="11" fill="#6d28d9">React Native / Expo</text>
  </g>

  <!-- ===== Platform / infra (right) ===== -->
  <rect x="965" y="24" width="140" height="56" rx="8" fill="#e2e8f0" stroke="#475569"/>
  <text x="1035" y="47" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">Config Server</text>
  <text x="1035" y="64" text-anchor="middle" font-size="10" fill="#475569">Spring Cloud Config</text>

  <rect x="965" y="110" width="140" height="58" rx="8" fill="#e2e8f0" stroke="#475569"/>
  <text x="1035" y="134" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">Admin Server</text>
  <text x="1035" y="151" text-anchor="middle" font-size="10" fill="#475569">Spring Boot Admin</text>

  <!-- ===== Gateway ===== -->
  <rect x="170" y="110" width="780" height="58" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="560" y="134" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">API Gateway — Spring Cloud Gateway (:8080)</text>
  <text x="560" y="153" text-anchor="middle" font-size="11" fill="#1d4ed8">path routing · JWT auth · Redis rate limiting · per-route circuit breakers</text>

  <!-- clients -> gateway -->
  <line x1="280" y1="80" x2="280" y2="109" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="80" x2="560" y2="109" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="840" y1="80" x2="840" y2="109" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- gateway -> services -->
  <line x1="560" y1="168" x2="560" y2="196" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="575" y="187" font-size="10" fill="#475569">routes /api/**</text>

  <!-- ===== Business services container ===== -->
  <rect x="35" y="196" width="1070" height="168" rx="10" fill="none" stroke="#cbd5e1" stroke-dasharray="4 4"/>
  <text x="46" y="212" font-size="11" font-weight="700" fill="#64748b">Business microservices — Spring Boot · database-per-service (PostgreSQL)</text>

  <!-- service box helper: fill #ffffff stroke #94a3b8 -->
  <!-- Row 1 -->
  <rect x="45" y="224" width="190" height="60" rx="8" fill="#ffffff" stroke="#0ea5e9"/>
  <text x="140" y="249" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">auth-service</text>
  <text x="140" y="267" text-anchor="middle" font-size="10" fill="#475569">users · roles · OTP · JWT  :9001</text>

  <rect x="255" y="224" width="190" height="60" rx="8" fill="#ffffff" stroke="#0ea5e9"/>
  <text x="350" y="249" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">customer-service</text>
  <text x="350" y="267" text-anchor="middle" font-size="10" fill="#475569">profile · address · wallet  :9002</text>

  <rect x="465" y="224" width="190" height="60" rx="8" fill="#ffffff" stroke="#0ea5e9"/>
  <text x="560" y="249" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">product-service</text>
  <text x="560" y="267" text-anchor="middle" font-size="10" fill="#475569">catalog · categories · reviews  :9003</text>

  <rect x="675" y="224" width="190" height="60" rx="8" fill="#ffffff" stroke="#0ea5e9"/>
  <text x="770" y="249" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">inventory-service</text>
  <text x="770" y="267" text-anchor="middle" font-size="10" fill="#475569">stock · suppliers · import  :9004</text>

  <rect x="885" y="224" width="190" height="60" rx="8" fill="#ffffff" stroke="#0ea5e9"/>
  <text x="980" y="249" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">cart-service</text>
  <text x="980" y="267" text-anchor="middle" font-size="10" fill="#475569">customer carts  :9013</text>

  <!-- Row 2 -->
  <rect x="45" y="296" width="190" height="60" rx="8" fill="#ffffff" stroke="#0ea5e9"/>
  <text x="140" y="321" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">order-service</text>
  <text x="140" y="339" text-anchor="middle" font-size="10" fill="#475569">orders · POS · B2B · finance  :9005</text>

  <rect x="255" y="296" width="190" height="60" rx="8" fill="#ffffff" stroke="#0ea5e9"/>
  <text x="350" y="321" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">payment-service</text>
  <text x="350" y="339" text-anchor="middle" font-size="10" fill="#475569">Razorpay · refunds · wallet  :9006</text>

  <rect x="465" y="296" width="190" height="60" rx="8" fill="#ffffff" stroke="#0ea5e9"/>
  <text x="560" y="321" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">shipping-service</text>
  <text x="560" y="339" text-anchor="middle" font-size="10" fill="#475569">packing · delivery · routing  :9007</text>

  <rect x="675" y="296" width="190" height="60" rx="8" fill="#ffffff" stroke="#0ea5e9"/>
  <text x="770" y="321" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">procurement-service</text>
  <text x="770" y="339" text-anchor="middle" font-size="10" fill="#475569">purchase orders · inspection  :9008</text>

  <rect x="885" y="296" width="190" height="60" rx="8" fill="#ffffff" stroke="#0ea5e9"/>
  <text x="980" y="321" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">subscription-service</text>
  <text x="980" y="339" text-anchor="middle" font-size="10" fill="#475569">milk subscriptions  :9014</text>

  <!-- services <-> kafka -->
  <line x1="560" y1="364" x2="560" y2="390" stroke="#b45309" stroke-width="1.8" marker-start="url(#arrow2)" marker-end="url(#arrow2)"/>
  <text x="575" y="381" font-size="10" fill="#b45309">publish / consume events</text>

  <!-- ===== Kafka ===== -->
  <rect x="45" y="392" width="1030" height="46" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="560" y="411" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">Apache Kafka — event bus</text>
  <text x="560" y="428" text-anchor="middle" font-size="10" fill="#9a3412">order · payment · inventory · shipment · product · customer · subscription events</text>

  <!-- ===== Data + External ===== -->
  <rect x="45" y="478" width="340" height="64" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="215" y="503" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">PostgreSQL — database per service</text>
  <text x="215" y="521" text-anchor="middle" font-size="10" fill="#166534">auth_db · order_db · product_db · payment_db …</text>

  <rect x="405" y="478" width="200" height="64" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="505" y="503" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">Redis</text>
  <text x="505" y="521" text-anchor="middle" font-size="10" fill="#991b1b">product cache · gateway rate-limit</text>

  <rect x="655" y="478" width="130" height="64" rx="8" fill="#f1f5f9" stroke="#64748b"/>
  <text x="720" y="503" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Razorpay</text>
  <text x="720" y="521" text-anchor="middle" font-size="10" fill="#475569">payments</text>

  <rect x="805" y="478" width="150" height="64" rx="8" fill="#f1f5f9" stroke="#64748b"/>
  <text x="880" y="503" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Maps / Geocode</text>
  <text x="880" y="521" text-anchor="middle" font-size="10" fill="#475569">shipping routes</text>

  <rect x="975" y="478" width="120" height="64" rx="8" fill="#f1f5f9" stroke="#64748b"/>
  <text x="1035" y="503" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Email / SMS</text>
  <text x="1035" y="521" text-anchor="middle" font-size="10" fill="#475569">notifications</text>

  <text x="45" y="566" font-size="10" fill="#94a3b8">Also routed at the gateway but outside this snapshot: campaign-service, report-service, audit-service, cms-service.</text>
</svg>
